name: Build MirageSyno SPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Prepare environment
        run: |
          mkdir -p spks
          chmod -R +x .

      - name: Fetch build_dist.sh from tailscale
        run: |
          curl -L -o build_dist.sh https://raw.githubusercontent.com/tailscale/tailscale/main/build_dist.sh
          chmod +x build_dist.sh

      - name: Build SPK
        run: |
          set -e
          export GO111MODULE=on
          go run build.go --dsm-version=7 --goarch=amd64

      - name: Debug output
        if: always()
        run: |
          echo "==== root ===="
          ls -lah
          echo "==== spks ===="
          ls -lah spks || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mirage-syno-spk
          path: spks/*.spk
