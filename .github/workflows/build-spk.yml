name: Build MirageSyno SPK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build SPK
        run: go run build.go --dsm-version=7 --goarch=amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mirage-syno-spk
          path: release/*.spk
